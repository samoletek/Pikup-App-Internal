name: Dependency Integrity

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - ".gitignore"
      - ".github/CODEOWNERS"
      - ".github/workflows/dependency-integrity.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - ".gitignore"
      - ".github/CODEOWNERS"
      - ".github/workflows/dependency-integrity.yml"

jobs:
  npm-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps from lockfile
        run: npm ci

      - name: Ensure npm lockfile is not modified
        run: git diff --exit-code package-lock.json

      - name: Enforce pinned Stripe versions
        run: |
          node - <<'NODE'
          const pkg = require('./package.json');
          const deps = pkg.dependencies || {};
          const expected = {
            '@stripe/stripe-react-native': '0.57.3',
            '@stripe/stripe-identity-react-native': '0.4.1',
          };
          const mismatches = [];
          for (const [name, version] of Object.entries(expected)) {
            if (deps[name] !== version) {
              mismatches.push(`${name}: expected ${version}, got ${deps[name] || 'missing'}`);
            }
          }
          if (mismatches.length) {
            console.error('Pinned dependency policy failed:\\n' + mismatches.join('\\n'));
            process.exit(1);
          }
          console.log('Pinned dependency policy passed.');
          NODE
