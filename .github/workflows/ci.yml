name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke quality checks
        run: npm run check:smoke

      - name: Validate architecture guards
        run: |
          npm run check:ai-entrypoint
          npm run boundaries:check
          npm run size:check
          npm run errors:check
